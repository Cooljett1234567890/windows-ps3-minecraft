name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install v110 build tools
      shell: powershell
      run: |
        $url = "https://aka.ms/vs/16/release/vs_buildtools.exe"
        Invoke-WebRequest -Uri $url -OutFile vs_buildtools.exe
        Start-Process -FilePath .\vs_buildtools.exe -ArgumentList `
          "--quiet", "--norestart", "--nocache", `
          "--add", "Microsoft.VisualStudio.Component.VC.v141.x86.x64" `
          -Wait

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      run: msbuild MinecraftConsoles.sln /p:Configuration=Debug /p:Platform=Windows64 /p:PlatformToolset=v110

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinecraftWindows
        path: Windows64/
